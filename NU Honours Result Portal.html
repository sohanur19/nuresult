<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NU Results - Honours</title>
    <link rel="icon" type="image/png" sizes="16x16" href="NU Logo.png">
    <style>
        /* Modern Dynamic Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a5276, #2980b9, #154360, #2c3e50);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Glassmorphism Card Effect */
        .result-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        h2 {
            text-align: center;
            color: #1a5276;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
        }
        
        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: #1a5276;
            margin: 8px auto 0;
            border-radius: 2px;
        }
        
        /* Dynamic Input Styling */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
            transition: 0.3s;
        }
        
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eef2f3;
            border-radius: 12px;
            font-size: 16px;
            background: #f8fafc;
            color: #333;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        input:focus, select:focus {
            border-color: #3498db;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
            transform: translateY(-2px);
        }
        
        /* Hover Effect for Labels */
        .input-group:focus-within label {
            color: #3498db;
        }
        
        .optional-label { font-size: 11px; font-weight: normal; margin-left: 5px; opacity: 0.7; }
        
        /* Premium Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(26, 82, 118, 0.2);
            margin-top: 15px;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, #154360 0%, #1a5276 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(26, 82, 118, 0.3);
        }
        
        .submit-btn:active { transform: translateY(-1px); }
        
        /* Loader Animation */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Checkbox Styling */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #1a5276;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #7f8c8d;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            font-weight: 500;
            margin-top: 6px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .result-card {
                padding: 30px 20px;
                margin: 10px;
                border-radius: 20px;
            }
            h2 { font-size: 20px; }
        }
    </style>
</head>

<body>

    <div class="result-card">
        <h2>NU Result Portal</h2>

        <form id="resultForm">
            <div class="input-group">
                <label>Select Course Year</label>
                <select id="yearType" onchange="toggleRollRequired()" required>
                    <option value="first_year">First Year</option>
                    <option value="second_year">Second Year</option>
                    <option value="third_year">Third Year</option>
                    <option value="fourth_year">Fourth Year</option>
                    <option value="final_year">Final Year (Consolidated)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Roll Number <span id="rollStatus" class="optional-label">(Optional)</span></label>
                <input type="text" id="roll" placeholder="Enter Roll Number" inputmode="numeric">
            </div>

            <div class="input-group">
                <label>Registration No</label>
                <input type="text" id="reg" placeholder="Enter Registration No" required inputmode="numeric">
                <p id="regError" class="error-msg">⚠ বৈধ রেজিস্ট্রেশন নম্বর প্রদান করুন</p>
            </div>

            <div class="input-group">
                <label>Exam Year</label>
                <select id="examYear" required></select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="saveData">
                <label for="saveData">ভবিষ্যতের জন্য তথ্য মনে রাখুন</label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Get Result</span>
                <div class="spinner" id="loader"></div>
            </button>
        </form>
        <div class="footer-text">
            National University Bangladesh <br>
            Developed for Students
        </div>
    </div>

    <script>
        // স্ক্রিপ্ট অংশ আগের মতোই কাজ করবে, শুধুমাত্র ডিজাইন আরও ডাইনামিক করা হয়েছে।
        let generatedCode = "";
        
        function generate4DigitCaptcha() {
            const chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let code = "";
            for (let i = 0; i < 4; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
            generatedCode = code;
        }
        
        function populateExamYears() {
            const yearSelect = document.getElementById("examYear");
            const currentYear = new Date().getFullYear(); 
            for (let i = currentYear; i >= 2006; i--) {
                let option = document.createElement("option");
                option.value = i;
                option.text = i;
                yearSelect.appendChild(option);
            }
        }
        
        function toggleRollRequired() {
            const yearType = document.getElementById("yearType").value;
            const rollInput = document.getElementById("roll");
            const rollStatus = document.getElementById("rollStatus");
        
            if (yearType === "final_year") {
                rollInput.required = true;
                rollStatus.innerText = "(Required)";
                rollStatus.style.color = "#e74c3c";
            } else {
                rollInput.required = false;
                rollStatus.innerText = "(Optional)";
                rollStatus.style.color = "#888";
            }
        }
        
        function handleStorage() {
            const regInput = document.getElementById("reg");
            const rollInput = document.getElementById("roll");
            const saveCheck = document.getElementById("saveData");
        
            if (localStorage.getItem("nu_reg")) {
                regInput.value = localStorage.getItem("nu_reg");
                rollInput.value = localStorage.getItem("nu_roll") || "";
                saveCheck.checked = true;
            }
        }
        
        window.onload = function() {
            generate4DigitCaptcha();
            populateExamYears();
            toggleRollRequired();
            handleStorage();
        };
        
        document.getElementById("resultForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const loader = document.getElementById("loader");
            const submitBtn = document.getElementById("submitBtn");
            const reg = document.getElementById("reg").value;
            const roll = document.getElementById("roll").value;
            const saveCheck = document.getElementById("saveData");
        
            if (isNaN(reg) || reg.trim() === "") {
                document.getElementById("regError").style.display = "block";
                return;
            } else {
                document.getElementById("regError").style.display = "none";
            }
        
            if (saveCheck.checked) {
                localStorage.setItem("nu_reg", reg);
                localStorage.setItem("nu_roll", roll);
            } else {
                localStorage.removeItem("nu_reg");
                localStorage.removeItem("nu_roll");
            }
        
            loader.style.display = "block";
            submitBtn.style.opacity = "0.8";
            submitBtn.disabled = true;
        
            setTimeout(() => {
                const yearType = document.getElementById("yearType").value;
                const examYear = document.getElementById("examYear").value;
                const csrf = "lDnfB2dSE8"; 
        
                const finalUrl = `http://results.nu.ac.bd/honours/${yearType}_result_show.php?roll_number=${roll}&reg_no=${reg}&exam_year=${examYear}&letters_code=${generatedCode}&csrfHon=${csrf}`;
        
                window.open(finalUrl, "_blank");
                
                loader.style.display = "none";
                submitBtn.style.opacity = "1";
                submitBtn.disabled = false;
            }, 1200);
        });
    </script>
</body>

</html>
